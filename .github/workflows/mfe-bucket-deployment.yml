# MFE Bucket Deployment Workflow

# PURPOSE:
#   This workflow builds and deploys a Micro Frontend (MFE) application to a bucket

# TRIGGER:
#   This is a reusable workflow that can be called from other workflows using workflow_call.
#
# INPUTS:
#   - ENVIRONMENT: The deployment environment (e.g., 'prod', 'stage')

# REQUIRED GITHUB VARIABLES (vars):
#   - BUCKET_NAME: The name of the bucket where the MFE will be deployed | ** Env Based **
#   - NODE_VERSION: Version of Node.js to use for building
#   - APP_ID: The ID/name of the MFE application
#   - MFE_CONFIG_API_URL: The API URL for the MFE configuration
#   - ATLAS_OPTIONS: Optional. Configuration for translation pulling (if empty, step is skipped)

# REQUIRED SECRETS:
#   - GCP_CREDENTIALS_JSON: JSON string of GCP credentials with permissions to deploy to the target GCS bucket


name: MFE S3 Bucket Deployment 🚀

on:
  workflow_call:
    inputs:
      ENVIRONMENT:
        description: Deployment environment (prod, stage)
        type: string
        required: true
      BUCKET_NAME:
        type: string
        required: false
      PUBLIC_PATH_CDN:
        type: string
        required: false

jobs:
  build:
    environment:
      name: ${{ inputs.ENVIRONMENT }}
    runs-on: ubuntu-latest
    steps:
      - name: Echo workflow vars for debugging
        run: |
          echo "variables: ${{ toJson(vars) }}"
          echo "current branch: ${{ github.ref_name }}"
          echo "repo default branch: ${{ github.event.repository.default_branch }}"

      - name: Checkout MFE repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ vars.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ vars.NODE_VERSION }}

      - name: Cache node modules
        id: cache-npm
        uses: actions/cache@v4
        env:
          cache-name: cache-node-modules
        with:
          path: ~/.npm
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-
            ${{ runner.os }}-

      - if: ${{ steps.cache-npm.outputs.cache-hit != 'true' }}
        name: List installed node modules (for debugging)
        continue-on-error: true
        run: npm list

      - name: Install NPM dependencies
        run: npm install

      - name: Pull translations
        if: ${{ vars.ATLAS_OPTIONS != '' }}
        run: |
          export PATH="$(pwd)/node_modules/.bin:$PATH"
          make OPENEDX_ATLAS_PULL=true ATLAS_OPTIONS="${{ vars.ATLAS_OPTIONS }}" pull_translations

      - name: Build the application
        run: npm run build
        env:
          PUBLIC_PATH: ${{ inputs.PUBLIC_PATH_CDN || vars.PUBLIC_PATH_CDN }}
          APP_ID: ${{ vars.APP_ID }}
          MFE_CONFIG_API_URL: ${{ vars.MFE_CONFIG_API_URL }}
          ENABLE_NEW_RELIC: false
          NODE_ENV: production

      - name: Print generated HTML for verification
        run: cat dist/index.html

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ vars.APP_ID }}-dist-artifact
          path: dist

  deployment:
    environment:
      name: ${{ inputs.ENVIRONMENT }}
      url: ${{ inputs.PUBLIC_PATH_CDN || vars.PUBLIC_PATH_CDN }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ vars.APP_ID }}-dist-artifact
          path: ./dist

      - name: Echo workflow vars for debugging
        run: |
          echo "variables: ${{ toJson(vars) }}"

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS_JSON }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to GCS with Cache Headers
        run: |
          gcloud storage rsync ./dist gs://${{ inputs.BUCKET_NAME || vars.BUCKET_NAME }}/${{ vars.APP_ID }}/ \
            --recursive \
            --delete-unmatched-destination-objects \
            --cache-control="${{ vars.CACHE_CONTROL || 'public, max-age=86400, immutable' }}"
